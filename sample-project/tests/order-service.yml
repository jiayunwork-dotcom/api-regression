# 订单服务测试套件示例
id: order-service
name: 订单服务回归测试
description: 订单服务核心接口回归测试套件
baseUrl: ${env:base_url}

defaults:
  headers:
    Authorization: "Bearer ${token}"
    Content-Type: "application/json"
  timeout: 10000

before:
  variables:
    orderPrefix: "ORD"

tests:
  - id: create-order
    name: 创建订单
    description: 测试创建订单接口
    tags: ["smoke", "order", "critical"]
    request:
      method: POST
      url: /api/orders
      body:
        userId: ${defaultUserId}
        productId: "P001"
        quantity: 2
        remark: "测试订单 ${orderPrefix}"
    extracts:
      - name: createdOrderId
        from: body
        path: "$.data.id"
      - name: createdOrderNo
        from: body
        path: "data.orderNo"
    assertions:
      - id: status-200
        severity: critical
        statusCode: 200
        description: "创建订单必须返回200"
      - id: response-time
        severity: high
        responseTime: 2000
        description: "响应时间不超过2秒"
      - id: has-order-id
        severity: critical
        jsonPath:
          path: "$.data.id"
          operator: exists
      - id: order-success
        severity: high
        jsonPath:
          path: "$.code"
          operator: eq
          expected: 0
      - id: validate-schema
        severity: medium
        jsonSchema:
          type: object
          required: [code, data]
          properties:
            code: { type: integer }
            message: { type: string }
            data:
              type: object
              required: [id, orderNo, status]
              properties:
                id: { type: string }
                orderNo: { type: string }
                status: { type: string, enum: [PENDING, PAID, SHIPPED] }
      - id: contract-check
        severity: high
        contract:
          strict: true

  - id: get-order-detail
    name: 查询订单详情
    description: 根据订单ID查询详情，依赖创建订单
    tags: ["order"]
    dependsOn: ["create-order"]
    request:
      method: GET
      url: /api/orders/${createdOrderId}
    assertions:
      - statusCode: 200
        severity: critical
      - jsonPath:
          path: "$.data.id"
          operator: eq
          expected: ${createdOrderId}
        severity: critical
        description: "返回的订单ID应与创建时一致"
      - jsonPath:
          path: "$.data.status"
          operator: contains
          expected: "PENDING"
        severity: high
      - headerExists: "X-Request-Id"
        severity: low

  - id: list-orders
    name: 查询订单列表
    description: 分页查询订单列表
    tags: ["order", "smoke"]
    request:
      method: GET
      url: /api/orders
      queryParams:
        page: 1
        pageSize: 20
        status: PENDING
    assertions:
      - statusCode: 200
        severity: critical
      - jsonPath:
          path: "$.data.total"
          operator: gte
          expected: 1
        severity: medium
      - jsonPath:
          path: "$.data.items"
          operator: type
          expected: array
        severity: high

  - id: create-user-data-driven
    name: 批量创建用户 - 数据驱动
    description: 使用CSV数据文件批量测试创建用户接口
    tags: ["user", "data-driven"]
    dataSource:
      file: ./data/users.csv
      type: csv
      varPrefix: user
    request:
      method: POST
      url: /api/users
      body:
        name: ${user_name}
        email: ${user_email}
        age: ${user_age}
    extracts:
      - name: "newUserId_${__data_row_index}"
        from: body
        path: "$.data.id"
    assertions:
      - statusCode: 200
        severity: critical
      - jsonPath:
          path: "$.data.name"
          operator: eq
          expected: ${user_name}
        severity: high
